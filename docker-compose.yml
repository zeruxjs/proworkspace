services:
  manager:
    build:
      context: ./apps/manager
    container_name: proworkspace-manager
    restart: unless-stopped
    working_dir: /app
    command: npm start
    volumes:
      - ./config.json:/config.json
      - ./.env:/app/.env
      - ./generated:/generated
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: [ "CMD", "test", "-f", "/generated/nginx.conf" ]
      interval: 3s
      timeout: 3s
      retries: 10

  proworkspace:
    build:
      context: ./apps/proworkspace
    container_name: proworkspace-app
    restart: unless-stopped
    working_dir: /app
    environment:
      HOSTNAME: 0.0.0.0
      NODE_ENV: ${NODE_ENV}
      ENVIRONMENT: ${ENVIRONMENT}
      MAIN_DOMAIN: ${MAIN_DOMAIN}
      NS_DOMAIN: ${NS_DOMAIN}
      DNS_DOMAIN: ${DNS_DOMAIN}
      DEV_DOMAIN: ${DEV_DOMAIN}
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_PORT: 5432
      DB_PREFIX: ${DB_PREFIX:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY}
      PROMETHEUS_URL: http://prometheus:9090
    volumes:
      - ./logs/proworkspace:/app/.zerux/log
    command: /start.sh
    ports:
      - "${APP_PORT}:3000"
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_started
      prometheus:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: proworkspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      manager:
        condition: service_healthy

  coredns:
    image: coredns/coredns:latest
    container_name: proworkspace-coredns
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile
    ports:
      - "${COREDNS_BIND_IP:-0.0.0.0}:${COREDNS_PORT:-53}:53/udp"
      - "${COREDNS_BIND_IP:-0.0.0.0}:${COREDNS_PORT:-53}:53/tcp"
    volumes:
      - ./generated/coredns:/etc/coredns:ro
    depends_on:
      manager:
        condition: service_healthy
      postgres:
        condition: service_healthy

  adminer:
    image: adminer:latest
    container_name: proworkspace-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT}:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    container_name: proworkspace-redis
    restart: unless-stopped
    user: "0:0"
    command: >
      redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      manager:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: proworkspace-minio
    restart: unless-stopped
    user: "0:0"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      manager:
        condition: service_healthy

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: proworkspace-meilisearch
    restart: unless-stopped
    user: "0:0"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - ./data/meilisearch:/meili_data
    depends_on:
      manager:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: proworkspace-prometheus
    restart: unless-stopped
    user: "0:0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./generated/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy" ]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      manager:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: proworkspace-grafana
    restart: unless-stopped
    user: "0:0"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./data/grafana:/var/lib/grafana
    depends_on:
      manager:
        condition: service_healthy
